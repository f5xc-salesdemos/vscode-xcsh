name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [theme-updated, enriched-specs-updated]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Validate that code generation is deterministic
  validate-generation:
    name: Validate Generation
    runs-on: ubuntu-latest

    steps:
      - name: Log dispatch event
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "::notice::Triggered by repository_dispatch (${{ github.event.action }})"
          echo "Source: ${{ github.event.client_payload.trigger_source || github.event.client_payload.source_repo }}"
          echo "Version: ${{ github.event.client_payload.version || 'N/A' }}"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure specs are up-to-date
        run: npm run specs:ensure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate files
        run: npm run generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify idempotent generation
        run: |
          # Save hashes of first generation
          shasum -a 256 src/generated/*.ts src/generated/*.json > /tmp/first_hashes.txt

          # Run generation again
          npm run generate

          # Save hashes of second generation
          shasum -a 256 src/generated/*.ts src/generated/*.json > /tmp/second_hashes.txt

          # Compare hashes - generation must be deterministic
          if ! diff /tmp/first_hashes.txt /tmp/second_hashes.txt; then
            echo "ERROR: Generated files changed on second run!"
            echo "This indicates non-deterministic generation."
            exit 1
          fi

          echo "✅ Generation is idempotent and deterministic"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload generated files artifact
        uses: actions/upload-artifact@v7
        with:
          name: generated-files
          path: src/generated/
          retention-days: 1

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate-generation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync API specs from upstream
        run: npm run specs:sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
          path: src/generated/

      - name: Run linting
        run: npm run lint

      - name: Validate form defaults
        run: npm run validate:forms

      - name: Run type checking
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run unit tests with coverage
        run: npm run test:coverage
        if: matrix.os == 'ubuntu-latest'

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build extension
        run: npm run package

      # Linux requires xvfb for headless VSCode testing
      - name: Run integration tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:integration

      - name: Run integration tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:integration

  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync API specs from upstream
        run: npm run specs:sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
          path: src/generated/

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build production bundle
        run: npm run package

      - name: Package extension
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-xcsh-vsix
          path: "*.vsix"
          retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # Create release after successful build (main branch only)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, 'chore(release)')
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync API specs from upstream
        run: npm run specs:sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version
        id: version
        run: |
          VERSION_JSON=$(npm run version:json --silent)
          VERSION=$(echo "$VERSION_JSON" | jq -r '.version')
          SEMVER=$(echo "$VERSION_JSON" | jq -r '.semver')
          UPSTREAM=$(echo "$VERSION_JSON" | jq -r '.upstream')
          {
            echo "version=$VERSION"
            echo "semver=$SEMVER"
            echo "upstream=$UPSTREAM"
          } >> "$GITHUB_OUTPUT"
          echo "📦 Version: v$VERSION (semver: $SEMVER, upstream: $UPSTREAM)"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "🏷️ Created tag: $TAG"

      - name: Create version bump PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${{ steps.version.outputs.semver }}"
          BRANCH="chore/release-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          npm run version:update
          git add package.json
          git commit -m "chore(release): v${VERSION}"
          git push origin "$BRANCH"

          ISSUE_URL=$(gh issue create \
            --title "chore(release): v${VERSION}" \
            --body "Automated version bump to v${VERSION}." 2>&1) || true
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -o '[0-9]*$')

          PR_BODY="Closes #${ISSUE_NUMBER}

          ## Summary
          - Update package.json version to ${SEMVER}

          Automated release version bump."

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "$PR_BODY"

          gh pr merge "$BRANCH" --auto --squash || echo "Auto-merge enabled (will merge when checks pass)"

          echo "✅ Version bump PR created for v${VERSION}"

      - name: Update package.json version for VSIX
        env:
          HUSKY: 0
        run: npm run version:update

      - name: Build release VSIX
        run: |
          npm run package
          npm install -g @vscode/vsce
          vsce package --no-dependencies

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          VSIX_FILE=$(ls ./*.vsix)

          # Generate release notes from recent commits
          NOTES=$(git log --oneline -10 --no-merges --format="- %s")

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "## Changes

          Based on F5 XC API version: ${{ steps.version.outputs.upstream }}

          ### Recent commits:
          $NOTES

          ---
          📦 Download the \`.vsix\` file and install manually, or wait for VS Code Marketplace sync." \
            "$VSIX_FILE"

          echo "✅ Release created: $TAG"

      - name: Find VSIX file
        id: vsix
        run: echo "filename=$(ls ./*.vsix)" >> "$GITHUB_OUTPUT"

      - name: Publish to Open VSX Registry
        if: ${{ !contains(github.ref, 'BETA') }}
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ steps.vsix.outputs.filename }}
          skipDuplicate: true
        continue-on-error: true

      - name: Publish to VS Code Marketplace
        if: ${{ !contains(github.ref, 'BETA') }}
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.filename }}
          skipDuplicate: true
        continue-on-error: true
